<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星芒话术助手</title>
  <link rel="manifest" href="data:application/json,{%22name%22:%22星芒话术助手%22,%22short_name%22:%22话术助手%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22theme_color%22:%22%23F09A1A%22,%22background_color%22:%22%23ffffff%22}">
  <meta name="theme-color" content="#F09A1A">
  <meta name="description" content="星芒AI进化岛销售话术助手 — 话术秒搜秒用，AI智能生成回复，支持截图识别">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23F09A1A'/><text x='50' y='68' font-size='56' font-weight='bold' fill='white' text-anchor='middle' font-family='sans-serif'>星</text></svg>">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- 拼音搜索支持 -->
  <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#F09A1A', brandDark: '#D4850F' },
          fontFamily: { sans: ['"Noto Sans SC"', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .toast-enter { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    mark.hl {
      background: #FFF1D1;
      color: #8B4F00;
      padding: 0 1px;
      border-radius: 2px;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { scrollbar-width: none; }
    .prose-sm table { border-collapse: collapse; }
    .prose-sm table th { border-bottom: 2px solid #e5e7eb; }
    .prose-sm hr { border-color: #e5e7eb; }
    .prose-sm strong { color: #111827; }
    /* Modal overlay */
    .modal-overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); }
    @keyframes dot { 0%, 20% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    .thinking-dots span { animation: dot 1.4s infinite; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen" x-data="app()" x-init="init()" x-cloak>

  <!-- 密码门 -->
  <template x-if="!authenticated">
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="bg-white rounded-xl shadow-lg border border-gray-100 p-8 w-full max-w-sm">
        <div class="mb-6">
          <div class="w-10 h-10 rounded-md bg-brand flex items-center justify-center mb-3">
            <span class="text-white font-bold text-lg">星</span>
          </div>
          <h1 class="text-xl font-bold text-gray-900">星芒话术助手</h1>
          <p class="text-gray-500 text-sm mt-1">话术秒搜 · AI 智能回复 · 截图识别</p>
        </div>
        <form @submit.prevent="login()">
          <label class="block text-xs font-medium text-gray-600 mb-1.5">团队密码</label>
          <input type="password" x-model="passwordInput" placeholder="向 Tia 获取密码"
            class="w-full border border-gray-200 rounded-md px-3 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent"
            autofocus>
          <p x-show="loginError" class="text-red-500 text-sm mt-2" x-text="loginError"></p>
          <button type="submit"
            class="w-full mt-4 bg-brand text-white py-2.5 rounded-md font-medium hover:bg-brandDark transition cursor-pointer">
            进入
          </button>
        </form>
      </div>
    </div>
  </template>

  <!-- 主界面 -->
  <template x-if="authenticated">
    <div class="max-w-[1440px] mx-auto px-6 py-4">
      <!-- 顶部栏：logo + 身份 tab + 操作按钮（紧凑 inline） -->
      <div class="sticky top-0 z-20 bg-gray-50/95 backdrop-blur-sm pt-1 pb-2 -mx-6 px-6 border-b border-transparent" :class="{'border-gray-200/60': scrolled}" @scroll.window="scrolled = window.scrollY > 10">
        <div :class="showAI ? 'flex items-center gap-3' : 'flex items-center gap-3 max-w-3xl mx-auto'">
          <div class="w-7 h-7 rounded-md bg-brand flex items-center justify-center shrink-0">
            <span class="text-white font-bold text-sm">星</span>
          </div>
          <h1 class="text-base font-bold text-gray-900 shrink-0">话术助手</h1>
          <!-- 身份 tab（inline 紧凑版） -->
          <div class="flex gap-0.5 bg-gray-100 rounded-md p-0.5 shrink-0">
            <template x-for="r in [{id:'tia',label:'Tia 本人'},{id:'partner',label:'合伙人'},{id:'bd',label:'企业BD'}]" :key="r.id">
              <button @click="setRole(r.id)"
                class="text-xs px-3 py-1 rounded transition-all cursor-pointer"
                :class="role === r.id ? 'bg-white text-gray-900 shadow-sm font-medium' : 'text-gray-500 hover:text-gray-700'"
                x-text="r.label"></button>
            </template>
          </div>
          <div class="flex-1"></div>
          <!-- 合伙人资料（仅合伙人/BD 身份显示） -->
          <button x-show="role !== 'tia' && onboardingScripts.length > 0" @click="showOnboardingDocs = true"
            class="text-xs px-2.5 py-1 rounded-md text-gray-500 hover:text-gray-900 transition flex items-center gap-1 cursor-pointer shrink-0"
            title="合伙人资料（佣金/工具说明）">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
            </svg>
            合伙人资料
          </button>
          <!-- 我的称谓设置 -->
          <button @click="showOperatorSetting = true"
            class="text-xs px-1.5 py-1 rounded-md text-gray-400 hover:text-gray-900 transition cursor-pointer shrink-0"
            :title="'我的称谓：' + (effectiveOperator || '未设置')">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </button>
          <!-- 新增话术按钮 -->
          <button @click="openCustomEditor()"
            class="text-xs px-2.5 py-1 rounded-md text-gray-500 hover:text-gray-900 transition flex items-center gap-1 cursor-pointer shrink-0">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
            </svg>
            新增
          </button>
          <!-- 优化建议（独立工具入口，带未读徽标） -->
          <button @click="openOptimizationsPanel()"
            class="relative text-xs px-2.5 py-1 rounded-md transition flex items-center gap-1 cursor-pointer shrink-0"
            :class="showOptimizationsPanel ? 'bg-purple-600 text-white' : 'text-purple-600 hover:bg-purple-50'"
            title="基于微信聊天反向分析话术表现">
            <span>💡</span>
            <span>优化建议</span>
            <span x-show="pendingOptimizationsCount() > 0"
              class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold rounded-full min-w-[16px] h-4 px-1 flex items-center justify-center"
              x-text="pendingOptimizationsCount()"></span>
          </button>
          <button @click="toggleAI()"
            class="text-xs px-2.5 py-1 rounded-md transition flex items-center gap-1 cursor-pointer shrink-0"
            :class="showAI ? 'bg-brand text-white' : 'text-gray-500 hover:text-gray-900'">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456Z"/>
            </svg>
            AI 智能回复
          </button>
        </div>
      </div>

      <!-- 自适应工作台布局：AI 展开时双栏，AI 收起时单列居中 -->
      <div :class="showAI ? 'grid grid-cols-[420px_1fr] gap-6 mt-4 items-start' : 'max-w-3xl mx-auto mt-4'">

      <!-- 右栏：AI 智能回复（仅 showAI 时显示） -->
      <div x-show="showAI" class="order-2 min-w-0 max-h-[calc(100vh-100px)] overflow-y-auto">
      <div class="max-w-2xl">
      <!-- AI 聊天面板 -->
      <div x-show="showAI" x-transition class="bg-white rounded-md border border-brand/30 p-4">
        <div class="flex items-start gap-2 mb-3">
          <div class="flex-1">
            <h2 class="text-sm font-semibold text-gray-900">AI 智能回复</h2>
            <p class="text-xs text-gray-500">粘贴客户聊天记录，AI 帮你判断级别并生成回复</p>
          </div>
          <button @click="showAI = false" class="text-gray-400 hover:text-gray-600 text-xs cursor-pointer">收起</button>
        </div>
        <!-- 对话历史（多轮） -->
        <template x-if="aiMessages.length > 0">
          <div class="mb-3 space-y-2 max-h-60 overflow-y-auto scroll-smooth" x-ref="chatHistory">
            <template x-for="(msg, i) in aiMessages" :key="i">
              <div class="text-sm rounded-md p-2" :class="msg.role === 'user' ? 'bg-gray-100 text-gray-700' : 'bg-brand/5 text-gray-800'">
                <span class="text-[11px] font-medium" :class="msg.role === 'user' ? 'text-gray-500' : 'text-brand'" x-text="msg.role === 'user' ? '你' : 'AI'"></span>
                <div x-html="msg.role === 'assistant' ? formatAIResult(msg.content) : displayUserMsg(msg.content)"></div>
              </div>
            </template>
          </div>
        </template>
        <!-- 图片预览条 -->
        <div x-show="aiImages.length > 0" class="flex gap-2 mb-2 flex-wrap">
          <template x-for="(img, i) in aiImages" :key="i">
            <div class="relative group">
              <img :src="img.preview" class="w-16 h-16 object-cover rounded border border-gray-200">
              <button @click="aiImages.splice(i, 1)"
                class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-red-500 text-white rounded-full text-[10px] leading-none flex items-center justify-center opacity-0 group-hover:opacity-100 transition cursor-pointer">x</button>
            </div>
          </template>
        </div>
        <!-- 输入区 -->
        <div class="relative">
          <textarea x-model="aiInput" rows="3" placeholder="粘贴客户的微信聊天记录，或直接 Ctrl+V 粘贴截图..."
            @paste="handlePaste($event)"
            @input="$el.style.height = 'auto'; $el.style.height = Math.min($el.scrollHeight, 200) + 'px'"
            class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand resize-none pr-10"></textarea>
          <label class="absolute right-2 bottom-2 cursor-pointer text-gray-400 hover:text-brand transition" title="上传聊天截图">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z"/></svg>
            <input type="file" accept="image/*" multiple class="hidden" @change="handleImageUpload($event)">
          </label>
        </div>
        <div class="flex justify-between items-center mt-2">
          <div class="flex items-center gap-3">
            <span class="text-xs" :class="aiInput.length > 3000 ? 'text-red-500' : 'text-gray-400'" x-text="aiInput.length + ' 字' + (aiInput.length > 3000 ? '（建议精简）' : '') + (aiImages.length > 0 ? ' + ' + aiImages.length + '张图' : '')"></span>
            <button x-show="aiMessages.length > 0" @click="if(confirm('清空全部对话？')) { aiMessages = []; aiResult = ''; aiImages = []; }"
              class="text-xs text-gray-400 hover:text-gray-600 cursor-pointer">清空对话</button>
          </div>
          <button @click="askAI()" :disabled="aiLoading || (!aiInput.trim() && aiImages.length === 0)"
            class="px-4 py-1.5 bg-brand text-white text-sm rounded-md hover:bg-brandDark disabled:opacity-40 disabled:cursor-not-allowed transition cursor-pointer">
            <span x-show="!aiLoading" x-text="aiMessages.length > 0 ? '继续追问' : '分析并生成回复'"></span>
            <span x-show="aiLoading" class="thinking-dots">AI 思考中<span>.</span><span>.</span><span>.</span></span>
          </button>
        </div>
        <!-- AI 结果（三条话术卡片） -->
        <div x-show="aiResult" class="mt-3 space-y-2">
          <!-- 判断区 -->
          <div x-show="getAIJudgment()" class="bg-gray-50 rounded-md p-3 border border-gray-100">
            <div x-html="formatAIResult(getAIJudgment())" class="text-sm leading-relaxed text-gray-800"></div>
          </div>
          <!-- 话术卡片 -->
          <template x-for="(script, i) in getAIScripts()" :key="i">
            <div class="bg-white rounded-md p-3 border border-brand/20 hover:border-brand/40 transition">
              <div class="flex items-center justify-between mb-1">
                <span class="text-xs font-medium text-brand" x-text="script.label"></span>
                <button @click="copyText(script.content)"
                  class="text-sm bg-brand text-white px-3 py-1.5 rounded hover:bg-brandDark cursor-pointer">
                  复制
                </button>
              </div>
              <div class="text-sm text-gray-800 leading-relaxed whitespace-pre-wrap border border-transparent hover:border-gray-200 rounded p-1 -m-1 focus:outline-none focus:border-brand/30 focus:bg-brand/5 transition" contenteditable="true" @blur="script.content = $el.innerText" x-text="script.content"></div>
            </div>
          </template>
          <!-- 下一步 -->
          <div x-show="getAINextStep()" class="bg-gray-50 rounded-md p-3 border border-gray-100">
            <div x-html="formatAIResult(getAINextStep())" class="text-sm leading-relaxed text-gray-800"></div>
          </div>
          <!-- 操作按钮 -->
          <div class="flex flex-wrap gap-2 pt-1">
            <button @click="copyAIReplyOnly()" class="text-xs bg-gray-200 text-gray-700 px-3 py-1.5 rounded hover:bg-gray-300 cursor-pointer">
              复制全部话术
            </button>
            <button @click="aiInput = ''; aiResult = ''; aiImages = []; $nextTick(() => { const ta = $el.closest('.bg-white')?.querySelector('textarea'); if(ta) ta.focus(); })" class="text-xs text-gray-500 hover:text-gray-900 cursor-pointer">
              重新分析
            </button>
          </div>
        </div>
        <p x-show="aiError" class="mt-2 text-sm text-red-500" x-text="aiError"></p>
        <!-- 空状态使用提示（无输入、无结果、非加载中时显示） -->
        <div x-show="aiMessages.length === 0 && !aiResult && !aiLoading && !aiError" class="mt-4 pt-4 border-t border-gray-100 text-xs text-gray-500 leading-relaxed space-y-1.5">
          <p class="text-gray-700 font-medium mb-1">怎么用</p>
          <p>· 复制客户微信聊天截图后，<span class="font-mono text-gray-700">Ctrl+V</span> 直接粘贴到输入框，AI 会判断客户温度并生成 3 条不同策略的回复</p>
          <p>· 文字对话也可以，复制粘贴即可；多轮追问可以持续粘贴</p>
          <p>· 生成后每条话术可以直接在卡片里编辑再复制</p>
        </div>
      </div>
      </div><!-- /max-w-2xl -->
      </div>
      <!-- /右栏 -->

      <!-- 左栏（AI展开时）/ 主列（AI收起时）：话术库 -->
      <div :class="showAI ? 'order-1 min-w-0 max-h-[calc(100vh-100px)] overflow-y-auto pr-1' : 'min-w-0'">

      <!-- 搜索框（左栏顶部） -->
      <div class="relative mb-3">
        <input type="text" x-model="query" x-ref="searchInput"
          @input="selectedIdx = 0"
          @keydown.down.prevent="moveSelection(1)"
          @keydown.up.prevent="moveSelection(-1)"
          @keydown.enter.prevent="copySelected()"
          @keydown.escape="query = ''; selectedIdx = 0"
          placeholder="搜索话术，支持拼音首字母如 jg = 价格"
          aria-label="搜索话术"
          class="w-full border border-gray-200 rounded-md px-3 py-2 pl-9 text-[14px] bg-white focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent">
        <svg class="absolute left-2.5 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <span x-show="query" @click="query = ''" class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600 cursor-pointer text-xs">清除</span>
      </div>
      <p x-show="!query" class="text-[11px] text-gray-400 mb-2 px-0.5">
        ↑↓ 选择 · Enter 复制 · 共 <span x-text="filteredByRole.length"></span> 条
      </p>

      <!-- 分类 Tab -->
      <div class="relative mb-3">
      <div class="absolute right-0 top-0 bottom-2 w-8 bg-gradient-to-l from-gray-50 to-transparent pointer-events-none z-10"></div>
      <div class="flex gap-1.5 overflow-x-auto pb-2 scrollbar-hide">
        <button @click="activeTab = '全部'; query = ''"
          class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition whitespace-nowrap border cursor-pointer"
          :class="activeTab === '全部' && !query ? 'bg-gray-900 text-white border-gray-900' : 'bg-white text-gray-600 border-gray-200 hover:border-gray-400'">
          全部 <span class="opacity-60" x-text="filteredByRole.length"></span>
        </button>
        <!-- 最近使用 Tab -->
        <button x-show="recentIds.length > 0" @click="activeTab = '最近'; query = ''"
          class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition whitespace-nowrap border cursor-pointer"
          :class="activeTab === '最近' && !query ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-blue-600 border-blue-200 hover:border-blue-400'">
          最近
        </button>
        <!-- 收藏夹 Tab -->
        <button x-show="favorites.size > 0" @click="activeTab = '收藏'; query = ''"
          class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition whitespace-nowrap border cursor-pointer"
          :class="activeTab === '收藏' && !query ? 'bg-brand text-white border-brand' : 'bg-white text-brand border-brand/30 hover:border-brand'">
          收藏 <span class="opacity-60" x-text="favorites.size"></span>
        </button>
        <!-- 自定义 Tab -->
        <button x-show="customScripts.length > 0" @click="activeTab = '自定义'; query = ''"

        </div>

            <div class="rounded-md border p-3"

                'bg-red-50 border-red-300': optimizations.analyzed_account?.type === 'personal'

                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 flex-wrap">
                    <span class="text-xs font-medium"
                      :class="{
                        'text-emerald-700': optimizations.analyzed_account?.type === 'business',
                        'text-amber-700': optimizations.analyzed_account?.type === 'unknown' || !optimizations.analyzed_account,
                        'text-red-700': optimizations.analyzed_account?.type === 'personal'

                    <span class="text-xs text-gray-600" x-show="optimizations.analyzed_account?.nickname">
                      昵称：<span x-text="optimizations.analyzed_account.nickname"></span>
                    </span>
                    <span class="text-xs text-gray-500 font-mono" x-show="optimizations.analyzed_account?.wxid"

                  </div>

                      </button>

            </template>

            <!-- 空状态 -->

                      <span class="text-xs text-gray-700 flex-1 min-w-0 truncate" x-text="p.diagnosis"></span>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>

        </div><!-- /max-w-4xl -->

            <div class="flex gap-2 justify-center">
              <button @click="aiInput = query; showAI = true; query = ''"
                class="bg-brand text-white text-sm px-4 py-2 rounded-md hover:bg-brandDark transition cursor-pointer">

              </button>
              <button @click="openCustomEditor(null, query)"
                class="bg-gray-200 text-gray-700 text-sm px-4 py-2 rounded-md hover:bg-gray-300 transition cursor-pointer">

              </button>
            </div>
          </div>
        </div>

    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-5" @click.stop>
      <h2 class="text-base font-bold text-gray-900 mb-4" x-text="editingScript ? (editorForm._isOfficial ? '修改话术' : '编辑话术') : '新增话术'"></h2>
      <div class="space-y-3">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">标题</label>
          <input type="text" x-model="editorForm.title" placeholder="如：沉默客户三天后激活"
            class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">话术内容</label>
          <textarea x-model="editorForm.content" rows="6" placeholder="实际发给客户的文字..."
            class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand resize-none"></textarea>
        </div>
        <div x-show="!editorForm._isOfficial">
          <label class="block text-xs font-medium text-gray-600 mb-1">分类</label>
          <select x-model="editorForm.category"
            class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand bg-white">
            <template x-for="cat in allCategories" :key="cat">
              <option :value="cat" x-text="cat"></option>
            </template>
            <option value="自定义">自定义</option>
          </select>
        </div>
        <p x-show="editorForm._isOfficial" class="text-xs text-gray-400">修改后可随时点「恢复原版」还原</p>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button @click="showEditor = false" class="text-sm text-gray-500 hover:text-gray-900 px-4 py-2 cursor-pointer">取消</button>
        <button @click="saveCustomScript()" :disabled="!editorForm.title.trim() || !editorForm.content.trim()"
          class="text-sm bg-brand text-white px-4 py-2 rounded-md hover:bg-brandDark disabled:opacity-40 transition cursor-pointer">
          保存
        </button>
      </div>
    </div>
  </div>

  <!-- 称谓设置弹窗 -->
  <div x-show="showOperatorSetting" x-transition.opacity class="fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4" @click.self="showOperatorSetting = false">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm p-5" @click.stop>
      <h2 class="text-base font-bold text-gray-900 mb-1">我的称谓</h2>
      <p class="text-xs text-gray-500 mb-4">话术里出现 <code class="bg-gray-100 px-1 rounded text-[11px]">&#123;&#123;operator&#125;&#125;</code> 会自动替换成这里填的名字</p>
      <input type="text" x-model="operatorName" placeholder="比如：小明 / Tia / 李姐"
        @keydown.enter="saveOperatorName()"
        class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-brand">
      <p class="text-[11px] text-gray-400 mb-4">
        留空则使用默认：Tia 身份自动显示 Tia，其他身份显示 "[你的名字]"
      </p>
      <div class="flex justify-end gap-2">
        <button @click="showOperatorSetting = false" class="text-sm text-gray-500 hover:text-gray-900 px-4 py-2 cursor-pointer">取消</button>
        <button @click="saveOperatorName()" class="text-sm bg-brand text-white px-4 py-2 rounded-md hover:bg-brandDark cursor-pointer">保存</button>
      </div>
    </div>
  </div>

  <!-- 合伙人资料弹窗 -->
  <div x-show="showOnboardingDocs" x-transition.opacity class="fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4" @click.self="showOnboardingDocs = false">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl p-5 max-h-[85vh] overflow-y-auto" @click.stop>
      <div class="flex items-start justify-between mb-4">
        <div>
          <h2 class="text-base font-bold text-gray-900">合伙人资料</h2>
          <p class="text-xs text-gray-500 mt-1">给新合伙人的一次性材料：欢迎、佣金结构、工具说明。日常话术库里不再出现。</p>
        </div>
        <button @click="showOnboardingDocs = false" class="text-gray-400 hover:text-gray-600 text-sm cursor-pointer">关闭</button>
      </div>
      <div class="space-y-3">
        <template x-for="s in onboardingScripts" :key="s.id">
          <div class="bg-gray-50 rounded-md p-3 border border-gray-100">
            <h3 class="text-sm font-medium text-gray-900 mb-2" x-text="s.title"></h3>
            <div class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap" x-text="renderContent(s.content)"></div>
            <button @click="copyText(s.content)" class="text-xs text-brand hover:underline mt-2 cursor-pointer">复制</button>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div x-show="toast" x-transition
    class="fixed top-4 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-4 py-2 rounded-md text-sm shadow-lg toast-enter z-50 flex items-center gap-2">
    <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
    </svg>
    <span x-text="toast"></span>
  </div>

  <!-- 版本更新提示 -->
  <div x-show="updateAvailable" x-transition
    class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-brand text-white px-4 py-2.5 rounded-md text-sm shadow-lg z-50 flex items-center gap-3">
    <span>话术库已更新</span>
    <button @click="forceReload()" class="bg-white/20 hover:bg-white/30 px-2 py-0.5 rounded text-xs cursor-pointer">刷新</button>
    <button @click="updateAvailable = false" class="text-white/60 hover:text-white cursor-pointer text-xs">忽略</button>
  </div>

<script>
// 拼音工具（pinyin-pro CDN 加载后可用）
function getPinyinInitials(text) {
  try {
    if (window.pinyinPro && window.pinyinPro.pinyin) {
      return window.pinyinPro.pinyin(text, { pattern: 'first', type: 'array' }).join('');
    }
  } catch(e) {}
  return '';
}

function app() {
  return {
    // Auth
    authenticated: localStorage.getItem('hs_auth') === 'ok',
    passwordInput: '',
    loginError: '',

    // Data
    scripts: [],         // 官方话术（原始数据）
    scriptOverrides: JSON.parse(localStorage.getItem('hs_overrides') || '{}'),  // 官方话术的修改覆盖
    customScripts: JSON.parse(localStorage.getItem('hs_custom') || '[]'),
    categories: [],

    // Role
    role: localStorage.getItem('hs_role') || 'tia',
    // 称谓（话术里 {{operator}} 会替换成这个）
    operatorName: localStorage.getItem('hs_operator_name') || '',
    showOperatorSetting: false,
    showOnboardingDocs: false,

    // Search / navigation
    query: '',
    activeTab: '全部',
    selectedIdx: 0,
    expandedId: null,

    // Usage tracking
    usageCount: JSON.parse(localStorage.getItem('hs_usage') || '{}'),
    recentIds: JSON.parse(localStorage.getItem('hs_recent') || '[]'),

    // Favorites
    favorites: new Set(JSON.parse(localStorage.getItem('hs_favorites') || '[]')),

    // AI (multi-turn)
    showAI: false,
    aiInput: '',
    aiResult: '',
    aiError: '',
    aiLoading: false,
    aiMessages: [],
    aiImages: [],   // [{name, base64, preview, mediaType}]

    // 内联快速添加话术
    inlineAddFor: null,  // 当前展开内联表单的话术ID
    inlineAddForm: { title: '', content: '', category: '' },

    // Custom script editor
    showEditor: false,
    editingScript: null,
    editorForm: { title: '', content: '', category: '自定义' },

    // UI
    toast: '',
    scrolled: false,
    updateAvailable: false,
    loadError: false,
    API_BASE: 'https://sales-assistant-api.zeabur.app',

    // 优化建议
    showOptimizationsPanel: false,
    optimizations: null,
    optimizationsLoading: false,
    optimizationsLoadError: false,
    optimizationsLoadedOnce: false,
    ghPat: localStorage.getItem('sales_assistant_gh_pat') || '',
    editingProposal: null,
    expandedEvidence: null,
    ghBusy: false,
    GH_OWNER: 'tia923136-ai',
    GH_REPO: 'sales-assistant',
    GH_BRANCH: 'main',

    // 拼音缓存
    _pinyinCache: {},

    get allScripts() {
      // 应用覆盖：如果官方话术被编辑过，用覆盖版本替换
      const merged = this.scripts.map(s => {
        const ov = this.scriptOverrides[s.id];
        if (ov) return { ...s, title: ov.title, content: ov.content, _overridden: true };
        return s;
      });
      const custom = this.customScripts.map(s => ({ ...s, _custom: true }));
      return [...merged, ...custom];
    },

    get filteredByRole() {
      return this.allScripts.filter(s => !s._onboarding && (!s.roles || s.roles.includes(this.role) || s._custom));
    },

    get onboardingScripts() {
      return this.allScripts.filter(s => s._onboarding);
    },

    get effectiveOperator() {
      // 默认跟身份走：Tia 身份 → 'Tia'；其他身份未设置 → '[你的名字]'
      if (this.operatorName) return this.operatorName;
      if (this.role === 'tia') return 'Tia';
      return '';
    },

    renderContent(text) {
      if (!text) return text;
      const op = this.effectiveOperator || '[你的名字]';
      return text.replace(/\{\{operator\}\}/g, op);
    },

    saveOperatorName() {
      localStorage.setItem('hs_operator_name', this.operatorName.trim());
      this.showOperatorSetting = false;
      this.showToast(this.operatorName.trim() ? '称谓已保存' : '已清除称谓');
    },

    get roleCategories() {
      return [...new Set(this.filteredByRole.filter(s => !s._custom).map(s => s.category))];
    },

    get allCategories() {
      return [...new Set(this.scripts.map(s => s.category))];
    },

    get displayList() {
      let list = this.filteredByRole;

      if (this.query) {
        const q = this.query.toLowerCase();
        list = list.filter(s => {
          // 文本匹配
          if (s.title.toLowerCase().includes(q) ||
              s.content.toLowerCase().includes(q) ||
              (s.tags && s.tags.some(t => t.toLowerCase().includes(q))) ||
              (s.espanso_trigger && s.espanso_trigger.includes(q))) {
            return true;
          }
          // 拼音首字母匹配
          const titlePy = this.getPinyinCached(s.title);
          if (titlePy && titlePy.includes(q)) return true;
          return false;
        });
      } else if (this.activeTab === '最近') {
        const recentSet = new Set(this.recentIds);
        list = list.filter(s => recentSet.has(s.id));
        // 按最近使用顺序排序
        list.sort((a, b) => this.recentIds.indexOf(a.id) - this.recentIds.indexOf(b.id));
        return list.slice(0, 20);
      } else if (this.activeTab === '收藏') {
        list = list.filter(s => this.favorites.has(s.id));
      } else if (this.activeTab === '自定义') {
        list = list.filter(s => s._custom);
      } else if (this.activeTab !== '全部') {
        list = list.filter(s => s.category === this.activeTab);
      }

      // 排序：收藏优先 > featured > 高频使用 > 最近使用
      list = [...list].sort((a, b) => {
        const aFav = this.favorites.has(a.id) ? 1 : 0;
        const bFav = this.favorites.has(b.id) ? 1 : 0;
        if (aFav !== bFav) return bFav - aFav;
        if (a.featured !== b.featured) return (b.featured ? 1 : 0) - (a.featured ? 1 : 0);
        const aUse = this.usageCount[a.id] || 0;
        const bUse = this.usageCount[b.id] || 0;
        if (aUse !== bUse) return bUse - aUse;
        const aRecent = this.recentIds.indexOf(a.id);
        const bRecent = this.recentIds.indexOf(b.id);
        if (aRecent !== -1 && bRecent === -1) return -1;
        if (aRecent === -1 && bRecent !== -1) return 1;
        if (aRecent !== -1 && bRecent !== -1) return aRecent - bRecent;
        return 0;
      });

      return list.slice(0, 50);
    },

    getPinyinCached(text) {
      if (!text) return '';
      if (this._pinyinCache[text]) return this._pinyinCache[text];
      const py = getPinyinInitials(text);
      this._pinyinCache[text] = py;
      return py;
    },

    async init() {
      if (!this.authenticated) return;
      try {
        const res = await fetch('sales-scripts.json?v=' + Date.now());
        const data = await res.json();
        // 版本检查
        const oldVersion = localStorage.getItem('hs_data_version');
        const newVersion = data.length + '-' + (data[0]?.id || '');
        if (oldVersion && oldVersion !== newVersion) {
          this.updateAvailable = true;
        }
        localStorage.setItem('hs_data_version', newVersion);
        this.scripts = data;
        this.categories = [...new Set(data.map(s => s.category))];
      } catch (e) {
        console.error('Failed to load scripts:', e);
        this.loadError = true;
      }
      this.$nextTick(() => this.$refs.searchInput?.focus());
      // 后台预加载优化建议（让顶栏徽标有未读数）
      this.loadOptimizations();
      // 新用户首次登录自动展开 AI 面板
      if (!localStorage.getItem('hs_ai_seen')) {
        this.showAI = true;
        localStorage.setItem('hs_ai_seen', '1');
      }
      // 注册 Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }
    },

    login() {
      const pw = this.passwordInput;
      if (!pw) { this.loginError = '请输入密码'; return; }
      if (pw === 'TEAM2026' || pw === 'starglow2026') {
        localStorage.setItem('hs_auth', 'ok');
        localStorage.setItem('hs_pw', pw);
        // starglow2026 是合伙人密码，自动切到合伙人视角
        if (pw === 'starglow2026' && !localStorage.getItem('hs_role')) {
          this.role = 'partner';
          localStorage.setItem('hs_role', 'partner');
        }
        this.authenticated = true;
        this.$nextTick(() => {
          this.init();
          if (pw === 'starglow2026') this.showToast('已切换到合伙人模式');
        });
      } else {
        this.loginError = '密码错误，向 Tia 确认';
      }
    },

    setRole(r) {
      this.role = r;
      this.activeTab = '全部';
      localStorage.setItem('hs_role', r);
    },

    toggleAI() { this.showAI = !this.showAI; },
    toggleExpand(id) { this.expandedId = this.expandedId === id ? null : id; },

    categoryCount(cat) {
      return this.filteredByRole.filter(s => s.category === cat).length;
    },

    // ---- 收藏 ----
    toggleFavorite(id) {
      if (this.favorites.has(id)) {
        this.favorites.delete(id);
        this.showToast('已取消收藏');
      } else {
        this.favorites.add(id);
        this.showToast('已收藏');
      }
      localStorage.setItem('hs_favorites', JSON.stringify([...this.favorites]));
    },

    // ---- 话术编辑（统一入口） ----
    openScriptEditor(item) {
      if (item._custom) {
        this.openCustomEditor(item);
      } else {
        // 编辑官方话术 → 用覆盖机制
        this.editingScript = item;
        this.editorForm = {
          title: item.title,
          content: item.content,
          category: item.category,
          _isOfficial: true,  // 标记为官方话术编辑
        };
        this.showEditor = true;
      }
    },

    restoreOriginal(id) {
      if (!confirm('恢复为原始话术？你的修改会丢失')) return;
      delete this.scriptOverrides[id];
      localStorage.setItem('hs_overrides', JSON.stringify(this.scriptOverrides));
      this.showToast('已恢复原版');
    },

    // ---- 自定义话术 CRUD ----
    openCustomEditor(item, prefillTitle) {
      this.editingScript = item || null;
      this.editorForm = {
        title: item ? item.title : (prefillTitle || ''),
        content: item ? item.content : '',
        category: item ? item.category : '自定义',
      };
      this.showEditor = true;
    },

    saveCustomScript() {
      const form = this.editorForm;
      if (!form.title.trim() || !form.content.trim()) return;

      // 官方话术编辑 → 保存为覆盖
      if (form._isOfficial && this.editingScript) {
        this.scriptOverrides[this.editingScript.id] = {
          title: form.title.trim(),
          content: form.content.trim(),
          updatedAt: Date.now(),
        };
        localStorage.setItem('hs_overrides', JSON.stringify(this.scriptOverrides));
        this.showEditor = false;
        this.showToast('话术已更新');
        return;
      }

      if (this.editingScript) {
        // 编辑已有自定义话术
        const idx = this.customScripts.findIndex(s => s.id === this.editingScript.id);
        if (idx !== -1) {
          this.customScripts[idx] = {
            ...this.customScripts[idx],
            title: form.title.trim(),
            content: form.content.trim(),
            category: form.category,
            updatedAt: Date.now(),
          };
        }
      } else {
        // 新增
        this.customScripts.push({
          id: 'custom-' + Date.now(),
          title: form.title.trim(),
          content: form.content.trim(),
          category: form.category,
          tags: [],
          featured: false,
          espanso_trigger: null,
          createdAt: Date.now(),
          updatedAt: Date.now(),
        });
      }
      localStorage.setItem('hs_custom', JSON.stringify(this.customScripts));
      this.showEditor = false;
      this.showToast(this.editingScript ? '话术已更新' : '话术已添加');
    },

    saveInlineScript() {
      const f = this.inlineAddForm;
      if (!f.title.trim() || !f.content.trim()) return;
      this.customScripts.push({
        id: 'custom-' + Date.now(),
        title: f.title.trim(),
        content: f.content.trim(),
        category: f.category || '自定义',
        tags: [],
        featured: false,
        espanso_trigger: null,
        createdAt: Date.now(),
        updatedAt: Date.now(),
      });
      localStorage.setItem('hs_custom', JSON.stringify(this.customScripts));
      this.inlineAddFor = null;
      this.showToast('话术已添加');
    },

    deleteCustomScript(id) {
      if (!confirm('确定删除这条自定义话术？')) return;
      this.customScripts = this.customScripts.filter(s => s.id !== id);
      localStorage.setItem('hs_custom', JSON.stringify(this.customScripts));
      this.favorites.delete(id);
      localStorage.setItem('hs_favorites', JSON.stringify([...this.favorites]));
      this.expandedId = null;
      this.showToast('已删除');
    },

    exportCustomScripts() {
      if (this.customScripts.length === 0) return;
      const text = this.customScripts.map(s =>
        `## ${s.title}\n分类：${s.category}\n\n${s.content}`
      ).join('\n\n---\n\n');
      this.copyText(text);
      this.showToast('已复制 ' + this.customScripts.length + ' 条自定义话术');
    },

    // ---- Markdown 渲染 ----
    renderMd(text) {
      if (!text) return '';
      let html = text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      html = html.replace(
        /(?:^|\n)(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)+)/g,
        (_, header, sep, body) => {
          const ths = header.split('|').filter(c => c.trim()).map(c => `<th class="px-2 py-1.5 text-left text-xs font-medium text-gray-500 bg-gray-50">${c.trim()}</th>`).join('');
          const rows = body.trim().split('\n').map(row => {
            const tds = row.split('|').filter(c => c.trim()).map(c => `<td class="px-2 py-1.5 text-sm text-gray-700 border-t border-gray-100">${c.trim()}</td>`).join('');
            return `<tr>${tds}</tr>`;
          }).join('');
          return `<div class="overflow-x-auto my-2"><table class="w-full border border-gray-200 rounded text-sm"><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table></div>`;
        }
      );
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong class="font-semibold text-gray-900">$1</strong>');
      html = html.replace(/\n---\n/g, '<hr class="my-3 border-gray-200">');
      html = html.replace(/^([·\-•]\s?)(.+)$/gm, '<div class="flex gap-1.5 ml-1"><span class="text-gray-400 shrink-0">·</span><span>$2</span></div>');
      html = html.replace(/^(\d+[.)]\s?)(.+)$/gm, '<div class="flex gap-1.5 ml-1"><span class="text-brand font-medium shrink-0">$1</span><span>$2</span></div>');
      html = html.replace(/^###\s+(.+)$/gm, '<div class="font-semibold text-gray-900 mt-3 mb-1">$1</div>');
      html = html.replace(/\n/g, '<br>');
      html = html.replace(/<br>\s*<div/g, '<div');
      html = html.replace(/<\/div>\s*<br>/g, '</div>');
      html = html.replace(/<br>\s*<hr/g, '<hr');
      html = html.replace(/hr>\s*<br>/g, 'hr>');
      return html;
    },

    highlight(text) {
      if (!text) return '';
      let html = this.renderMd(text);
      if (!this.query) return html;
      const q = this.query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return html.replace(new RegExp(`(?<=>)([^<]*?)(${q})`, 'gi'), (_, pre, match) => `${pre}<mark class="hl">${match}</mark>`);
    },

    // ---- 导航 ----
    moveSelection(delta) {
      const len = this.displayList.length;
      if (len === 0) return;
      this.selectedIdx = (this.selectedIdx + delta + len) % len;
      this.$nextTick(() => {
        const cards = document.querySelectorAll('[data-script-card]');
        cards[this.selectedIdx]?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      });
    },

    copySelected() {
      const item = this.displayList[this.selectedIdx];
      if (item) this.copyText(item.content, item.id);
    },

    async copyText(text, id) {
      // 首次遇到 {{operator}} 占位且非 Tia 身份未设称谓 → 提示先设置
      if (text && text.includes('{{operator}}') && this.role !== 'tia' && !this.operatorName
          && !localStorage.getItem('hs_operator_prompted')) {
        localStorage.setItem('hs_operator_prompted', '1');
        this.showOperatorSetting = true;
        this.showToast('话术里有称谓占位，先设一下你的名字');
        return;
      }
      const rendered = this.renderContent(text);
      try {
        await navigator.clipboard.writeText(rendered);
        this.showToast('已复制，去微信粘贴吧');
        if (id) this.trackUsage(id);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = rendered;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        this.showToast('已复制');
        if (id) this.trackUsage(id);
      }
    },

    trackUsage(id) {
      // 频次统计
      this.usageCount[id] = (this.usageCount[id] || 0) + 1;
      localStorage.setItem('hs_usage', JSON.stringify(this.usageCount));
      // 最近使用
      this.recentIds = [id, ...this.recentIds.filter(x => x !== id)].slice(0, 20);
      localStorage.setItem('hs_recent', JSON.stringify(this.recentIds));
    },

    logout() {
      if (!confirm('退出后需要重新输入密码')) return;
      localStorage.removeItem('hs_auth');
      localStorage.removeItem('hs_pw');
      localStorage.removeItem('hs_recent');
      this.authenticated = false;
      this.scripts = [];
    },

    showToast(msg) {
      this.toast = msg;
      setTimeout(() => this.toast = '', 2000);
    },

    forceReload() {
      this.updateAvailable = false;
      location.reload();
    },

    // ---- AI ----
    handlePaste(event) {
      const items = Array.from(event.clipboardData?.items || []);
      const imageItems = items.filter(item => item.type.startsWith('image/'));
      if (imageItems.length === 0) return; // 纯文字粘贴，不拦截
      event.preventDefault();
      if (this.aiImages.length + imageItems.length > 5) {
        this.showToast('最多上传5张图片');
        return;
      }
      for (const item of imageItems) {
        const file = item.getAsFile();
        if (!file) continue;
        const reader = new FileReader();
        reader.onload = (e) => {
          this.aiImages.push({
            name: 'clipboard-' + Date.now() + '.png',
            base64: e.target.result,
            preview: e.target.result,
            mediaType: file.type || 'image/png'
          });
        };
        reader.readAsDataURL(file);
      }
    },

    handleImageUpload(event) {
      const files = Array.from(event.target.files);
      if (this.aiImages.length + files.length > 5) {
        this.showToast('最多上传5张图片');
        return;
      }
      for (const file of files) {
        if (file.size > 5 * 1024 * 1024) {
          this.showToast(file.name + ' 超过5MB，跳过');
          continue;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          this.aiImages.push({
            name: file.name,
            base64: e.target.result,
            preview: e.target.result,
            mediaType: file.type || 'image/png'
          });
        };
        reader.readAsDataURL(file);
      }
      event.target.value = '';
    },

    async askAI() {
      if (this.aiLoading || (!this.aiInput.trim() && this.aiImages.length === 0)) return;
      this.aiLoading = true;
      this.aiResult = '';
      this.aiError = '';

      // 构建 content（可能含图片）
      let content;
      if (this.aiImages.length > 0) {
        content = [];
        for (const img of this.aiImages) {
          const base64Data = img.base64.split(',')[1];
          content.push({
            type: 'image',
            source: { type: 'base64', media_type: img.mediaType, data: base64Data }
          });
        }
        content.push({
          type: 'text',
          text: this.aiInput.trim() || '请识别截图中的聊天内容，然后分析并生成建议回复。'
        });
      } else {
        content = this.aiInput.trim();
      }

      this.aiMessages.push({ role: 'user', content: content });
      if (this.aiMessages.length > 6) {
        this.aiMessages = this.aiMessages.slice(-6);
      }

      try {
        const apiUrl = this.API_BASE ? `${this.API_BASE}/api/chat` : '/api/chat';
        const res = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('hs_pw') || 'TEAM2026'}`
          },
          body: JSON.stringify({
            messages: this.aiMessages.map(m => ({ role: m.role, content: m.content })),
            role: this.role
          })
        });
        if (res.status === 401) {
          this.aiError = '密码验证失败，请退出重新登录';
          this.aiMessages.pop();
          return;
        }
        if (res.status === 429) {
          this.aiError = '请求太频繁，等1分钟再试';
          this.aiMessages.pop();
          return;
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const reply = data.reply || data.content || '无回复';
        this.aiResult = reply;
        this.aiMessages.push({ role: 'assistant', content: reply });
        this.aiInput = '';
        this.aiImages = [];
        this.$nextTick(() => { if (this.$refs.chatHistory) this.$refs.chatHistory.scrollTop = this.$refs.chatHistory.scrollHeight; });
      } catch (e) {
        this.aiError = 'AI 暂时不可用，试试直接搜索话术';
        this.aiMessages.pop();
        console.error('AI error:', e);
      } finally {
        this.aiLoading = false;
      }
    },

    // 显示用户消息（兼容图片）
    displayUserMsg(content) {
      if (typeof content === 'string') return content.substring(0, 100) + (content.length > 100 ? '...' : '');
      const images = content.filter(b => b.type === 'image').length;
      const text = content.filter(b => b.type === 'text').map(b => b.text).join(' ');
      const prefix = images > 0 ? '[截图' + images + '张] ' : '';
      const display = prefix + text;
      return display.substring(0, 100) + (display.length > 100 ? '...' : '');
    },

    // 解析三条话术
    getAIJudgment() {
      if (!this.aiResult) return '';
      const match = this.aiResult.match(/📊[\s\S]*?(?=\n\s*💬)/);
      return match ? match[0].trim() : '';
    },

    getAIScripts() {
      if (!this.aiResult) return [];
      const scripts = [];
      const regex = /💬\s*(话术[ABC](?:（[^）]+）)?|第\d+条(?:（[^）]+）)?|建议回复)[：:]\s*\n([\s\S]*?)(?=💬\s*(?:话术|第\d|建议)|📌|$)/g;
      let m;
      while ((m = regex.exec(this.aiResult)) !== null) {
        scripts.push({ label: m[1].trim(), content: m[2].trim() });
      }
      // fallback：旧格式单条
      if (scripts.length === 0) {
        const oldStart = this.aiResult.indexOf('💬');
        const oldEnd = this.aiResult.indexOf('📌');
        if (oldStart !== -1) {
          const text = this.aiResult.substring(oldStart, oldEnd !== -1 ? oldEnd : undefined);
          scripts.push({ label: '建议回复', content: text.replace(/^💬[^：:]*[：:]?\s*/, '').trim() });
        }
      }
      return scripts;
    },

    getAINextStep() {
      if (!this.aiResult) return '';
      const match = this.aiResult.match(/📌[\s\S]*$/);
      return match ? match[0].trim() : '';
    },

    // 复制所有话术（不含判断和下一步）
    copyAIReplyOnly() {
      const scripts = this.getAIScripts();
      if (scripts.length === 0) {
        this.copyText(this.aiResult);
        return;
      }
      const text = scripts.map(s => s.content).join('\n\n---\n\n');
      this.copyText(text);
    },

    formatAIResult(text) {
      if (!text) return '';
      let html = this.renderMd(text);
      html = html.replace(/(📊|💬|📌|🔍)/g, '<span class="text-base inline-block mr-1">$1</span>');
      return html;
    },

    // ==================== 优化建议 ====================
    openOptimizationsPanel() {
      this.showOptimizationsPanel = true;
      // 首次打开或未加载过 → 拉数据
      if (!this.optimizationsLoadedOnce) this.loadOptimizations();
    },

    pendingOptimizationsCount() {
      if (!this.optimizations || !this.optimizations.proposals) return 0;
      return this.optimizations.proposals.filter(p => !p.status || p.status === 'pending').length;
    },

    async loadOptimizations() {
      this.optimizationsLoading = true;
      this.optimizationsLoadError = false;
      try {
        const res = await fetch('./script-optimizations.json?v=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        this.optimizations = await res.json();
      } catch (e) {
        console.warn('优化建议加载失败:', e);
        this.optimizations = null;
        this.optimizationsLoadError = true;
      } finally {
        this.optimizationsLoading = false;
        this.optimizationsLoadedOnce = true;
      }
    },

    pendingProposals() {
      if (!this.optimizations || !this.optimizations.proposals) return [];
      return this.optimizations.proposals.filter(p => !p.status || p.status === 'pending');
    },

    historyProposals() {
      if (!this.optimizations || !this.optimizations.proposals) return [];
      return this.optimizations.proposals.filter(p => p.status === 'accepted' || p.status === 'ignored');
    },

    isLocked() {
      return this.optimizations?.analyzed_account?.type === 'personal';
    },

    accountBadgeText() {
      const t = this.optimizations?.analyzed_account?.type;
      if (t === 'business') return '✓ 业务微信';
      if (t === 'personal') return '⚠ 私人微信（已锁定）';
      return '? 未知账号类型';
    },

    confidenceLabel(c) {
      const map = { high: '高', medium: '中', low: '低' };
      return map[c] || c || '未知';
    },

    formatDate(iso) {
      if (!iso) return '-';
      try {
        const d = new Date(iso);
        return d.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
      } catch { return iso; }
    },

    toggleEvidence(id) {
      this.expandedEvidence = this.expandedEvidence === id ? null : id;
    },

    promptPat() {
      const v = prompt(
        'GitHub Personal Access Token\n\n' +
        '需要 fine-grained token，scope: Contents (Read and write)\n' +
        '仓库：' + this.GH_OWNER + '/' + this.GH_REPO + '\n\n' +
        '存在 localStorage，可随时清除。'
      );
      if (v && v.trim()) {
        this.ghPat = v.trim();
        localStorage.setItem('sales_assistant_gh_pat', this.ghPat);
        this.showToast('PAT 已保存');
      }
    },

    clearPat() {
      if (!confirm('清除 PAT？下次采纳需要重新输入。')) return;
      this.ghPat = '';
      localStorage.removeItem('sales_assistant_gh_pat');
      this.showToast('PAT 已清除');
    },

    ensurePat() {
      if (!this.ghPat) {
        this.promptPat();
      }
      return !!this.ghPat;
    },

    async ghGetFile(path) {
      const url = `https://api.github.com/repos/${this.GH_OWNER}/${this.GH_REPO}/contents/${path}?ref=${this.GH_BRANCH}`;
      const res = await fetch(url, {
        headers: {
          'Authorization': 'Bearer ' + this.ghPat,
          'Accept': 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28'
        }
      });
      if (res.status === 404) return { sha: null, content: null };
      if (!res.ok) throw new Error(`GET ${path} 失败: ${res.status}`);
      const data = await res.json();
      const decoded = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
      return { sha: data.sha, content: decoded };
    },

    async ghPutFile(path, content, sha, message) {
      const url = `https://api.github.com/repos/${this.GH_OWNER}/${this.GH_REPO}/contents/${path}`;
      const body = {
        message,
        content: btoa(unescape(encodeURIComponent(content))),
        branch: this.GH_BRANCH,
      };
      if (sha) body.sha = sha;
      const res = await fetch(url, {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + this.ghPat,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
          'X-GitHub-Api-Version': '2022-11-28'
        },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const err = await res.text();
        throw new Error(`PUT ${path} 失败: ${res.status} ${err.substring(0, 200)}`);
      }
      return await res.json();
    },

    regenerateEspanso(scripts, oldYml = '') {
      const lines = ['matches:'];
      // 先保留旧 yml 里存在但 JSON 里没有的"孤儿"条目（例如 :test 调试用），避免重生成时丢失
      const jsonTriggers = new Set(scripts.filter(s => s.espanso_trigger).map(s => s.espanso_trigger));
      if (oldYml) {
        const orphanBlocks = this.extractOrphanMatches(oldYml, jsonTriggers);
        if (orphanBlocks.length) {
          lines.push('  # === 孤儿条目（JSON 未登记，保留原样）===');
          for (const block of orphanBlocks) lines.push(block);
          lines.push('');
        }
      }
      const withTrigger = scripts.filter(s => s.espanso_trigger);
      for (const s of withTrigger) {
        lines.push('  # ' + (s.title || ''));
        lines.push('  - trigger: "' + s.espanso_trigger + '"');
        const content = s.content || '';
        if (content.includes('\n')) {
          lines.push('    replace: |');
          for (const ln of content.split('\n')) {
            lines.push('      ' + ln);
          }
        } else {
          // escape double quotes
          const escaped = content.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
          lines.push('    replace: "' + escaped + '"');
        }
        lines.push('');
      }
      return lines.join('\n');
    },

    extractOrphanMatches(yml, knownTriggers) {
      // 粗粒度解析：按 "  - trigger:" 拆块，保留不在 knownTriggers 的块
      const orphans = [];
      const blockRegex = /(  - trigger:\s*"([^"]+)"[\s\S]*?)(?=\n  - trigger:|\n*$)/g;
      let m;
      while ((m = blockRegex.exec(yml)) !== null) {
        const block = m[1].replace(/\s+$/, '');
        const trigger = m[2];
        if (!knownTriggers.has(trigger)) orphans.push(block);
      }
      return orphans;
    },

    async acceptProposal(p) {
      if (this.isLocked()) {
        this.showToast('私人微信数据已锁定');
        return;
      }
      if (!this.ensurePat()) return;
      if (!confirm(`采纳后将自动提交到 GitHub：\n\n${p.script_id}: ${p.diagnosis}\n\n确认采纳？`)) return;

      this.ghBusy = true;
      try {
        // 1. 拉四个文件
        const scriptsFile = await this.ghGetFile('sales-scripts.json');
        const optimsFile = await this.ghGetFile('script-optimizations.json');
        const historyFile = await this.ghGetFile('optimization-history.json');

        // 2. 改 sales-scripts.json
        const scripts = JSON.parse(scriptsFile.content);
        const target = scripts.find(s => s.id === p.script_id);
        if (!target) throw new Error('话术 ' + p.script_id + ' 在 sales-scripts.json 里找不到');
        const oldContent = target.content;
        target.content = p.new_content;
        const newScriptsContent = JSON.stringify(scripts, null, 2) + '\n';

        // 3. 重新生成 espanso（传旧 yml 进去，保留孤儿调试条目如 :test）
        const espansoFile = await this.ghGetFile('espanso-tia-sales.yml');
        const newEspanso = this.regenerateEspanso(scripts, espansoFile.content || '');

        // 4. 追加历史
        let history = { history: [] };
        if (historyFile.content) {
          try { history = JSON.parse(historyFile.content); } catch {}
          if (!history.history) history.history = [];
        }
        history.history.push({
          accepted_at: new Date().toISOString(),
          script_id: p.script_id,
          diagnosis: p.diagnosis,
          old_content: oldContent,
          new_content: p.new_content,
          evidence_summary: (p.evidence || []).slice(0, 2).map(e => e.chat || e.snippet || '').join(' | ').substring(0, 300),
          accepted_by: 'tia',
          confidence: p.confidence,
          source_proposal_id: p.id
        });
        const newHistoryContent = JSON.stringify(history, null, 2) + '\n';

        // 5. 改 script-optimizations.json status
        const optims = JSON.parse(optimsFile.content);
        const op = (optims.proposals || []).find(x => x.id === p.id);
        if (op) op.status = 'accepted';
        const newOptimsContent = JSON.stringify(optims, null, 2) + '\n';

        // 6. 串行提交（每次拿最新 sha）
        const msg = `feat(scripts): 优化话术 ${p.script_id} via 反向分析`;
        let r1 = await this.ghPutFile('sales-scripts.json', newScriptsContent, scriptsFile.sha, msg);
        let r2 = await this.ghPutFile('espanso-tia-sales.yml', newEspanso, espansoFile.sha, msg + ' (espanso 同步)');
        let r3 = await this.ghPutFile('optimization-history.json', newHistoryContent, historyFile.sha, msg + ' (历史)');
        let r4 = await this.ghPutFile('script-optimizations.json', newOptimsContent, optimsFile.sha, msg + ' (标记采纳)');

        // 本地更新 UI
        p.status = 'accepted';
        this.editingProposal = null;
        this.showToast('已采纳并提交 4 个 commit');
      } catch (e) {
        console.error(e);
        alert('采纳失败：' + e.message);
      } finally {
        this.ghBusy = false;
      }
    },

    async ignoreProposal(p) {
      if (!this.ensurePat()) return;
      if (!confirm(`忽略这条建议？\n\n${p.diagnosis}`)) return;
      this.ghBusy = true;
      try {
        const optimsFile = await this.ghGetFile('script-optimizations.json');
        const optims = JSON.parse(optimsFile.content);
        const op = (optims.proposals || []).find(x => x.id === p.id);
        if (op) op.status = 'ignored';
        const newContent = JSON.stringify(optims, null, 2) + '\n';
        await this.ghPutFile('script-optimizations.json', newContent, optimsFile.sha,
          `chore(optimizations): 忽略 ${p.id}`);
        p.status = 'ignored';
        this.showToast('已忽略');
      } catch (e) {
        console.error(e);
        alert('忽略失败：' + e.message);
      } finally {
        this.ghBusy = false;
      }
    },
  }
}
</script>
