matches:
  # === 测试 ===
  - trigger: ":test"
    replace: "Espanso测试成功！"

  # === 新客开场 ===
  - trigger: "；你好"
    replace: "Hi你好，我是Tia👋"

  - trigger: "；请问"
    replace: "请问你现在是遇到了具体问题想解决，比如用AI做内容创作、职场提效、做副业，还是想系统学习怎么用AI搭建一套自己的业务流呢？"

  # === 产品介绍 ===
  - trigger: "；产品"
    replace: "我的星芒AI进化岛是一个全年更新的实战知识库+微信答疑社群，里面有20万+字的实操手册，分了四大板块，做自媒体、职场提效、做一人公司、AI编程，每篇都有完整的步骤、提示词和案例。知识库是按年付费、全年更新的，如果AI工具迭代了、有更好的方法、新工具出现我们都会更新。"

  - trigger: "；业务流"
    replace: |
      我的知识库里有完整的一人公司板块，11篇实操手册，从方向验证到获客成交到复购运营，都是我自己搭建的、实操验证过的
      还有Vibe Coding板块，不用学编程也能自己搭AI产品
      这是我们知识库的部分目录 👇

  - trigger: "；自媒体"
    replace: |
      我的知识库里有完整的自媒体板块，11篇实操手册，从定位人设到内容生产到涨粉变现，都是我自己搭建的、实操验证过的
      不管是小红书、视频号还是公众号都能用
      还有Vibe Coding板块，不用学编程也能搭自己的内容工具
      这是我们知识库的部分目录 👇

  - trigger: "；提效"
    replace: |
      我的知识库里有职场提效板块，11篇实操手册，写周报、做数据、搞PPT这些高频场景都覆盖了
      每个场景都有步骤和Prompt模板，都是我自己验证过的，拿来就能用
      这是我们知识库的部分目录 👇

  # === 价格 ===
  - trigger: "；价格"
    replace: |
      999元/年，每天2.7元，持续更新一整年。
      现在是新春体验价，原价2999，3月31日后恢复。
      不急着决定，先去官网看看试读。

  # === 常见回复 ===
  - trigger: "；试读"
    replace: "可以，我官网上有各板块的试读，上面还有完整的产品介绍、社群介绍，全面了解一下。看完觉得合口味再考虑。"

  - trigger: "；新手"
    replace: "非常适合。每篇手册都有完整流程+配套Prompt，按步骤操作就行。不需要懂代码，群里有真人答疑，卡壳随时问。"

  - trigger: "；付款"
    replace: |
      点下方小程序直接支付就行。
      付完截图发我，我拉你进知识库+微信群。
      然后飞书登录知识库，先看「新人登岛指南」，3分钟上手。

  - trigger: "；真人"
    replace: |
      哈哈是我本人。
      不过我确实有几个AI工具在帮我处理重复工作。
      如果回你稍微慢了，可能在忙别的事，一般2小时内回你。

  - trigger: "；欢迎"
    replace: |
      恭喜登岛！
      今天做1件事：打开知识库首页→看《新人登岛指南》→加入微信群。
      明天我在群里带你走第一个实操案例。

  # === 添加更多话术 ===
  # 格式：
  # - trigger: "；触发词"
  #   replace: "话术内容"
  #
  # 多行内容用 replace: | 然后换行缩进写
